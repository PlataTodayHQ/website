name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    env:
      HAS_VPS: ${{ secrets.VPS_HOST != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to VPS
        if: env.HAS_VPS == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker stop plata-today || true
            docker rm plata-today || true
            docker run -d \
              --name plata-today \
              --restart unless-stopped \
              -p 4321:4321 \
              -v /opt/plata/data:/data \
              -e LLM_API_KEY="${{ secrets.LLM_API_KEY }}" \
              -e LLM_MODEL="${{ vars.LLM_MODEL || 'gpt-5-nano' }}" \
              -e LLM_BASE_URL="${{ vars.LLM_BASE_URL || 'https://api.openai.com/v1' }}" \
              -e S3_BUCKET="${{ secrets.HETZNER_S3_BUCKET }}" \
              -e S3_ENDPOINT="${{ secrets.HETZNER_S3_ENDPOINT }}" \
              -e S3_ACCESS_KEY="${{ secrets.HETZNER_S3_ACCESS_KEY }}" \
              -e S3_SECRET_KEY="${{ secrets.HETZNER_S3_SECRET_KEY }}" \
              -e S3_PUBLIC_URL="https://${{ secrets.HETZNER_S3_BUCKET }}.${{ secrets.HETZNER_S3_ENDPOINT }}" \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
