name: Pipeline & Deploy

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      skip_pipeline:
        description: 'Skip pipeline, only build & deploy'
        type: boolean
        default: false

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  pipeline-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HAS_LLM_KEY: ${{ secrets.LLM_API_KEY != '' }}
      HAS_HETZNER: ${{ secrets.HETZNER_S3_ACCESS_KEY != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # --- Restore DB from cache ---
      - name: Restore DB cache
        uses: actions/cache/restore@v4
        with:
          path: data/plata.db
          key: plata-db-dummy
          restore-keys: plata-db-

      - name: Ensure data directory
        run: mkdir -p data

      # --- Ensure DB schema ---
      - name: Initialize DB schema
        run: npx tsx apps/pipeline/src/db/migrate.ts
        env:
          DATABASE_PATH: ${{ github.workspace }}/data/plata.db

      # --- Run Pipeline ---
      - name: Run pipeline
        if: inputs.skip_pipeline != true && env.HAS_LLM_KEY == 'true'
        continue-on-error: true
        run: npm run pipeline:run
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'gpt-4.1-mini' }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL || 'https://api.openai.com/v1' }}
          DATABASE_PATH: ${{ github.workspace }}/data/plata.db
          MIN_IMPORTANCE_SCORE: '2.0'
          MAX_EVENTS_PER_RUN: '10'
          LOG_LEVEL: info

      # --- Save DB to cache ---
      - name: Save DB cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/plata.db
          key: plata-db-${{ github.run_id }}-${{ github.run_attempt }}

      # --- Build Astro ---
      - name: Build site
        run: npm run build
        env:
          DATABASE_PATH: ${{ github.workspace }}/data/plata.db

      # --- Deploy to Hetzner Object Storage ---
      - name: Deploy to Hetzner Object Storage
        if: env.HAS_HETZNER == 'true'
        run: |
          aws s3 sync apps/web/dist/ "s3://${{ secrets.HETZNER_S3_BUCKET }}/" \
            --endpoint-url "https://${{ secrets.HETZNER_S3_ENDPOINT }}" \
            --delete \
            --cache-control "public, max-age=300" \
            --no-progress
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: eu-central-1

      # --- Set cache headers for HTML files ---
      - name: Set HTML cache headers
        if: env.HAS_HETZNER == 'true'
        run: |
          aws s3 cp "s3://${{ secrets.HETZNER_S3_BUCKET }}/" "s3://${{ secrets.HETZNER_S3_BUCKET }}/" \
            --endpoint-url "https://${{ secrets.HETZNER_S3_ENDPOINT }}" \
            --recursive \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=60" \
            --metadata-directive REPLACE \
            --content-type "text/html; charset=utf-8" \
            --no-progress
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: eu-central-1
